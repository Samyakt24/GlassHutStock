<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangle Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #F7F3EE; color: #1C1410; min-height: 100vh; }

  #topbar { background: #2D1B69; height: 58px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 50; }
  #topbar-left { display: flex; align-items: center; gap: 10px; color: #fff; font-size: 17px; font-weight: 700; }
  .logo-circle { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #F59E0B, #EF4444); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  #topbar-subtitle { color: rgba(255,255,255,0.5); font-weight: 400; font-size: 14px; }
  #btn-back { background: rgba(255,255,255,0.15); border: none; color: #fff; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; display: none; align-items: center; justify-content: center; }
  #topbar-actions { display: flex; gap: 8px; align-items: center; }
  #btn-add-product { background: linear-gradient(135deg, #F59E0B, #EF4444); color: #fff; border-radius: 10px; padding: 8px 18px; font-size: 13px; font-weight: 700; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.18s; display: none; }
  #btn-add-product:hover { opacity: 0.9; transform: translateY(-1px); }
  #btn-add-nag { background: linear-gradient(135deg, #0F766E, #059669); color: #fff; border-radius: 10px; padding: 8px 18px; font-size: 13px; font-weight: 700; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.18s; display: none; }
  #btn-add-nag:hover { opacity: 0.9; transform: translateY(-1px); }
  #btn-edit  { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff;    border-radius: 9px; padding: 7px 16px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Nunito', sans-serif; display: none; }
  #btn-delete{ background: rgba(239,68,68,0.2);   border: 1px solid rgba(239,68,68,0.4);  color: #FCA5A5; border-radius: 9px; padding: 7px 16px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Nunito', sans-serif; display: none; }

  #tabs { background: #fff; border-bottom: 2px solid #EDE8E0; display: flex; padding: 0 20px; gap: 4px; }
  .tab-btn { padding: 13px 14px; font-size: 13px; font-weight: 500; color: #9C8B7A; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; margin-bottom: -2px; font-family: 'Nunito', sans-serif; transition: all 0.15s; }
  .tab-btn.active { font-weight: 700; color: #2D1B69; border-bottom-color: #2D1B69; }

  #body { max-width: 740px; margin: 0 auto; padding: 24px 16px 80px; }

  #toast { position: fixed; top: 18px; right: 18px; z-index: 999; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 700; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: none; animation: slideDown 0.2s ease; }
  #toast.ok  { background: #F0FDF4; color: #16A34A; border: 1.5px solid #BBF7D0; }
  #toast.err { background: #FEF2F2; color: #DC2626; border: 1.5px solid #FECACA; }

  .search-wrap { position: relative; margin-bottom: 18px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }
  .search-input { width: 100%; padding: 10px 14px 10px 40px; border-radius: 12px; border: 1.5px solid #E0D9D0; background: #FDFBF9; color: #1C1410; font-size: 14px; font-family: 'Nunito', sans-serif; outline: none; }
  .search-input:focus { border-color: #7C3AED; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }

  .prod-row { background: #fff; border-radius: 14px; box-shadow: 0 1px 6px rgba(44,27,105,0.06); border: 1px solid #EDE8E0; padding: 16px 18px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: all 0.18s; margin-bottom: 10px; }
  .prod-row:hover { box-shadow: 0 4px 20px rgba(44,27,105,0.13); transform: translateY(-1px); border-color: #C4B5FD; }
  .prod-icon { width: 46px; height: 46px; border-radius: 12px; background: linear-gradient(135deg, #F3E8FF, #FDE8D8); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .prod-meta { flex: 1; min-width: 0; }
  .prod-name { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
  .prod-sub  { font-size: 12px; color: #9C8B7A; display: flex; gap: 10px; flex-wrap: wrap; }
  .prod-cost { text-align: right; flex-shrink: 0; }
  .prod-cost-main  { font-size: 15px; font-weight: 800; color: #2D1B69; }
  .prod-cost-label { font-size: 11px; color: #9C8B7A; font-weight: 600; }
  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }

  .detail-hero { border-radius: 20px; padding: 24px; margin-bottom: 14px; color: #fff; position: relative; overflow: hidden; background: linear-gradient(135deg, #2D1B69 0%, #4C3FA0 60%, #7C3AED 100%); }
  .detail-hero::before { content:''; position:absolute; top:-20px; right:-20px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.06); }
  .detail-hero::after  { content:''; position:absolute; bottom:-30px; right:40px; width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.04); }
  .hero-inner { display: flex; justify-content: space-between; align-items: flex-start; position: relative; z-index: 2; }
  .hero-eyebrow { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .hero-name    { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
  .hero-karigar { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 5px 14px; }
  .hero-cost-label { font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 2px; text-align: right; }
  .hero-cost-val   { font-size: 28px; font-weight: 800; }

  .section-label { font-size: 11px; font-weight: 700; color: #9C8B7A; text-transform: uppercase; letter-spacing: 0.12em; margin: 0 0 10px 2px; }
  .detail-card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(44,27,105,0.07); border: 1px solid #EDE8E0; overflow: hidden; margin-bottom: 12px; }
  .tbl-head { display: grid; background: #F7F3EE; padding: 10px 18px; }
  .tbl-head span { font-size: 11px; font-weight: 800; color: #9C8B7A; text-transform: uppercase; letter-spacing: 0.08em; }
  .tbl-row  { display: grid; padding: 12px 18px; border-top: 1px solid #F0EBE4; }
  .tbl-row:nth-child(odd) { background: #FDFAF7; }
  .t-name { font-size: 14px; font-weight: 700; color: #2D1B69; }
  .t-cell { font-size: 14px; color: #1C1410; }
  .t-amt  { font-size: 14px; font-weight: 800; color: #2D1B69; }
  .unit-badge { background: #FEF3C7; color: #92400E; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; }
  .subtotal-row { display: grid; padding: 10px 18px; background: #EEF2FF; border-top: 2px solid #C7D2FE; }
  .charges-section { padding: 14px 18px; border-top: 1px solid #F0EBE4; }
  .charges-lbl { font-size: 11px; font-weight: 800; color: #9C8B7A; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .charge-row  { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px dashed #EDE8E0; }
  .charge-row span   { font-size: 13px; color: #6B5E4E; }
  .charge-row strong { font-size: 13px; font-weight: 700; }
  .total-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; background: linear-gradient(135deg, #2D1B69, #4C3FA0); }
  .total-bar span   { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.8); }
  .total-bar strong { font-size: 20px; font-weight: 800; color: #fff; }
  .notes-box { background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 14px; padding: 14px 18px; margin-bottom: 12px; }
  .notes-lbl { font-size: 11px; font-weight: 800; color: #92400E; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .notes-box p { font-size: 13px; color: #78350F; line-height: 1.7; }

  .karigar-hero { border-radius: 20px; padding: 24px; margin-bottom: 16px; display: flex; align-items: center; gap: 18px; background: linear-gradient(135deg, #1C1410, #3D2B1F); }
  .karigar-name { font-weight: 800; font-size: 22px; color: #fff; margin-bottom: 4px; }
  .karigar-sub  { font-size: 13px; color: rgba(255,255,255,0.6); }
  .view-badge   { background: #F3E8FF; color: #7C3AED; border-radius: 20px; padding: 4px 14px; font-size: 12px; font-weight: 700; flex-shrink: 0; }

  /* Nag Library */
  .nag-lib-row { background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(44,27,105,0.06); border: 1px solid #EDE8E0; padding: 14px 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .nag-lib-dot  { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, #E0F7F4, #A7F3D0); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .nag-lib-name { font-weight: 700; font-size: 15px; flex: 1; }
  .nag-lib-unit { background: #FEF3C7; color: #92400E; padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .nag-lib-actions { display: flex; gap: 6px; }
  .btn-icon     { background: #F7F3EE; border: 1.5px solid #E0D9D0; border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer; font-family: 'Nunito', sans-serif; }
  .btn-icon.del { background: #FFF0F0; border-color: #FECACA; color: #DC2626; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #fff; border-radius: 20px; padding: 28px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(44,27,105,0.2); animation: fadeIn 0.2s ease; }
  .modal-title { font-size: 16px; font-weight: 800; color: #2D1B69; margin-bottom: 20px; }

  /* Form */
  .form-box { background: #fff; border-radius: 16px; box-shadow: 0 1px 8px rgba(44,27,105,0.06); border: 1px solid #EDE8E0; padding: 20px 22px; margin-bottom: 14px; }
  .form-section-title { font-size: 12px; font-weight: 800; color: #7C3AED; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-label  { font-size: 12px; font-weight: 700; color: #7C6A5A; margin-bottom: 6px; letter-spacing: 0.04em; display: block; }
  .form-input  { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #E0D9D0; background: #FDFBF9; color: #1C1410; font-size: 14px; font-family: 'Nunito', sans-serif; outline: none; transition: all 0.15s; }
  .form-input:focus { border-color: #7C3AED; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
  .form-select  { width: 100%; padding: 10px; border-radius: 10px; border: 1.5px solid #E0D9D0; background: #FDFBF9; color: #1C1410; font-size: 13px; font-family: 'Nunito', sans-serif; outline: none; }
  .form-textarea{ width: 100%; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #E0D9D0; background: #FDFBF9; color: #1C1410; font-size: 14px; font-family: 'Nunito', sans-serif; outline: none; min-height: 80px; resize: vertical; }
  .nag-cols     { display: grid; grid-template-columns: 2fr 1fr 1fr 1.2fr 36px; gap: 8px; }
  .other-cols   { display: grid; grid-template-columns: 2fr 1fr 36px; gap: 8px; }
  .btn-add-row  { width: 100%; padding: 10px; border: 2px dashed #C4B5FD; background: #FAF7FF; border-radius: 10px; font-size: 13px; font-weight: 700; color: #7C3AED; cursor: pointer; font-family: 'Nunito', sans-serif; margin-top: 4px; }
  .btn-add-other{ width: 100%; padding: 9px; border: 2px dashed #D0C8BE; background: #FAF7F4; border-radius: 10px; font-size: 13px; font-weight: 700; color: #9C8B7A; cursor: pointer; font-family: 'Nunito', sans-serif; margin-top: 4px; }
  .btn-del      { background: #FFF0F0; color: #DC2626; border: 1.5px solid #FECACA; border-radius: 8px; width: 36px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Nunito', sans-serif; }
  .form-actions { display: flex; gap: 10px; }
  .btn-primary  { background: linear-gradient(135deg, #2D1B69, #4C3FA0); color: #fff; border: none; border-radius: 12px; padding: 13px 24px; font-size: 14px; font-weight: 700; cursor: pointer; flex: 1; font-family: 'Nunito', sans-serif; transition: all 0.18s; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-ghost    { background: #F7F3EE; color: #6B5E4E; border: 1.5px solid #E0D9D0; border-radius: 12px; padding: 13px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Nunito', sans-serif; }

  /* Pick from Nag List */
  .pick-wrap { position: relative; margin-bottom: 12px; }
  .pick-btn  { width: 100%; padding: 10px 16px; background: #F0FFF4; border: 1.5px solid #A7F3D0; border-radius: 10px; font-size: 13px; font-weight: 700; color: #0F766E; cursor: pointer; font-family: 'Nunito', sans-serif; text-align: left; }
  .pick-list { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: #fff; border: 1.5px solid #E0D9D0; border-radius: 12px; box-shadow: 0 8px 24px rgba(44,27,105,0.12); z-index: 100; max-height: 200px; overflow-y: auto; display: none; }
  .pick-list.open { display: block; }
  .pick-item { padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #F0EBE4; }
  .pick-item:last-child { border-bottom: none; }
  .pick-item:hover { background: #F7F3EE; }
  .pick-unit { font-size: 11px; background: #FEF3C7; color: #92400E; padding: 2px 8px; border-radius: 20px; font-weight: 700; }

  .screen { display: none; animation: fadeIn 0.25s ease; }
  .screen.active { display: block; }
  .empty { text-align: center; color: #C4B5A0; padding: 56px 0; font-size: 14px; font-weight: 500; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn    { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  @media(max-width:520px){
    .form-grid-2{grid-template-columns:1fr}
    .nag-cols{grid-template-columns:2fr 1fr 1fr 1fr 36px}
    .hero-inner{flex-direction:column;gap:12px}
  }
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-left">
    <button id="btn-back">←</button>
    <div class="logo-circle">◎</div>
    <span>Bangle Manager</span>
    <span id="topbar-subtitle"></span>
  </div>
  <div id="topbar-actions">
    <button id="btn-add-product">+ Add Product</button>
    <button id="btn-add-nag">+ Add Nag</button>
    <button id="btn-edit">Edit</button>
    <button id="btn-delete">Delete</button>
  </div>
</div>

<div id="tabs">
  <button class="tab-btn active" data-tab="products">📦 Products</button>
  <button class="tab-btn" data-tab="karigar">👤 By Karigar</button>
  <button class="tab-btn" data-tab="naglist">🧪 Nag List</button>
</div>

<div id="body">
  <div class="search-wrap" id="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" placeholder="Search product or karigar…">
  </div>
  <div class="screen active" id="screen-products-list"></div>
  <div class="screen"        id="screen-products-detail"></div>
  <div class="screen"        id="screen-form"></div>
  <div class="screen"        id="screen-karigar-list"></div>
  <div class="screen"        id="screen-karigar-detail"></div>
  <div class="screen"        id="screen-naglist"></div>
</div>

<!-- Nag Modal -->
<div class="modal-overlay" id="nag-modal">
  <div class="modal-box">
    <div class="modal-title" id="nag-modal-title">Add Nag to List</div>
    <div style="margin-bottom:14px">
      <label class="form-label">Nag Name</label>
      <input class="form-input" id="nag-modal-name" placeholder="e.g. Red Glass">
    </div>
    <div style="margin-bottom:20px">
      <label class="form-label">Default Unit</label>
      <select class="form-select" id="nag-modal-unit"></select>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn-primary" id="nag-modal-save">Save</button>
      <button class="btn-ghost" onclick="closeNagModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const RATE_UNITS = ["per/pc","per/kg","per/gm","per/pack","per/dozen","per/set","per/bruce"];
const PALETTES   = [
  {bg:"#F4E8FF",fg:"#7C3AED"},{bg:"#FFF0E0",fg:"#C2410C"},
  {bg:"#E0F7F4",fg:"#0F766E"},{bg:"#FFF0F6",fg:"#BE185D"},
  {bg:"#E8F4FF",fg:"#1D4ED8"},{bg:"#F0FFF4",fg:"#15803D"}
];

const SAMPLE_P = [
  {id:"1",name:"Baby Bangle",karigar:"Ramesh Soni",nags:[{name:"Red Glass",count:12,rate:15,rateUnit:"per/pc"},{name:"Golden Nag",count:6,rate:40,rateUnit:"per/pc"},{name:"White Beads",count:1,rate:120,rateUnit:"per/pack"}],majduriCharge:80,thekeDari:50,otherCharges:[{label:"Packing",amount:20}],notes:"Size 2.4 only"},
  {id:"2",name:"Fancy Lac Bangle",karigar:"Suresh Meena",nags:[{name:"Lac Base",count:2,rate:30,rateUnit:"per/pc"},{name:"Mirror Chips",count:1,rate:80,rateUnit:"per/pack"},{name:"Colour Thread",count:5,rate:10,rateUnit:"per/gm"}],majduriCharge:120,thekeDari:60,otherCharges:[],notes:"Red, green, blue"},
  {id:"3",name:"Chooda Set",karigar:"Ramesh Soni",nags:[{name:"Pink Glass",count:21,rate:18,rateUnit:"per/pc"},{name:"Gold Zari",count:2,rate:90,rateUnit:"per/pack"}],majduriCharge:200,thekeDari:100,otherCharges:[{label:"Box",amount:40}],notes:"Set of 21"}
];
const SAMPLE_N = [
  {id:"n1",name:"Red Glass",unit:"per/pc"},{id:"n2",name:"Golden Nag",unit:"per/pc"},
  {id:"n3",name:"White Beads",unit:"per/pack"},{id:"n4",name:"Lac Base",unit:"per/pc"},
  {id:"n5",name:"Mirror Chips",unit:"per/pack"},{id:"n6",name:"Pink Glass",unit:"per/pc"},
  {id:"n7",name:"Gold Zari",unit:"per/pack"}
];

let products=[], nagLib=[], tab="products";
let selProduct=null, selKarigar=null, editId=null, editNagId=null, pickOpen=false;
let fs={name:"",karigar:"",nags:[],majduriCharge:"",thekeDari:"",otherCharges:[],notes:""};

const fmt  = n => "₹"+Number(n||0).toLocaleString("en-IN");
const cost = p => {
  const nag   = (p.nags||[]).reduce((s,n)=>s+(+n.count||0)*(+n.rate||0),0);
  const other = (p.otherCharges||[]).reduce((s,o)=>s+(+o.amount||0),0);
  return {nag, total: nag+(+p.majduriCharge||0)+(+p.thekeDari||0)+other};
};
const ini  = n=>(n||"").split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
const pal  = n=>PALETTES[(n?.charCodeAt(0)||0)%PALETTES.length];
const esc  = s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const uid  = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);

function save(){
  try{localStorage.setItem("bm_products",JSON.stringify(products));localStorage.setItem("bm_nags",JSON.stringify(nagLib));}catch{}
}
function load(){
  try{products=JSON.parse(localStorage.getItem("bm_products"))||JSON.parse(JSON.stringify(SAMPLE_P));}catch{products=JSON.parse(JSON.stringify(SAMPLE_P));}
  try{nagLib=JSON.parse(localStorage.getItem("bm_nags"))||JSON.parse(JSON.stringify(SAMPLE_N));}catch{nagLib=JSON.parse(JSON.stringify(SAMPLE_N));}
}

let tt;
function toast(msg,type="ok"){
  const el=document.getElementById("toast");
  el.textContent=(type==="ok"?"✓ ":"⚠ ")+msg; el.className=type; el.style.display="block";
  clearTimeout(tt); tt=setTimeout(()=>el.style.display="none",2200);
}

// ── ROUTING ──
let cur="products-list";
function go(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+name)?.classList.add("active");
  cur=name;
  const isList=["products-list","karigar-list","naglist"].includes(name);
  const isDetail=name==="products-detail";
  document.getElementById("btn-back").style.display       = isList?"none":"flex";
  document.getElementById("btn-add-product").style.display= name==="products-list"?"block":"none";
  document.getElementById("btn-add-nag").style.display    = name==="naglist"?"block":"none";
  document.getElementById("btn-edit").style.display       = isDetail?"flex":"none";
  document.getElementById("btn-delete").style.display     = isDetail?"flex":"none";
  document.getElementById("search-wrap").style.display    = ["products-list","karigar-list"].includes(name)?"block":"none";
  const sub=document.getElementById("topbar-subtitle");
  sub.textContent = isDetail&&selProduct?"/ "+selProduct.name : name==="karigar-detail"&&selKarigar?"/ "+selKarigar : "";
}

// ── PRODUCTS LIST ──
function renderPList(){
  const q=(document.getElementById("search-input").value||"").toLowerCase();
  const list=products.filter(p=>[p.name,p.karigar].some(f=>(f||"").toLowerCase().includes(q)));
  const el=document.getElementById("screen-products-list");
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-icon">◎</div>No products. Click "+ Add Product".</div>`;return;}
  el.innerHTML=list.map(p=>`
    <div class="prod-row" onclick="openProduct('${esc(p.id)}')">
      <div class="prod-icon">◎</div>
      <div class="prod-meta">
        <div class="prod-name">${esc(p.name)}</div>
        <div class="prod-sub">${p.karigar?`<span>👤 ${esc(p.karigar)}</span>`:""}<span>🧪 ${p.nags?.length||0} ingredient${p.nags?.length!==1?"s":""}</span></div>
      </div>
      <div class="prod-cost">
        <div class="prod-cost-main">${fmt(cost(p).total)}</div>
        <div class="prod-cost-label">Total Cost</div>
      </div>
    </div>`).join("");
}

function openProduct(id){
  selProduct=products.find(p=>p.id===id);
  if(!selProduct)return;
  renderDetail();
  go("products-detail");
}

// ── DETAIL ──
function renderDetail(){
  const p=selProduct, c=cost(p);
  const cols="2fr 1fr 1fr 1.2fr 1fr";
  const nagsHtml=(p.nags||[]).length?`
    <div class="tbl-head" style="grid-template-columns:${cols}">
      <span>Name</span><span>Pieces</span><span>Rate</span><span>Unit</span><span>Amount</span>
    </div>
    ${p.nags.map(n=>{
      const a=(+n.count||0)*(+n.rate||0);
      return `<div class="tbl-row" style="grid-template-columns:${cols}">
        <span class="t-name">${esc(n.name)||"—"}</span>
        <span class="t-cell">${n.count||"—"}</span>
        <span class="t-cell">${fmt(n.rate)}</span>
        <span class="t-cell"><span class="unit-badge">${esc(n.rateUnit||"per/pc")}</span></span>
        <span class="t-amt">${fmt(a)}</span>
      </div>`;
    }).join("")}
    <div class="subtotal-row" style="grid-template-columns:${cols}">
      <span style="font-size:12px;font-weight:700;color:#6366F1">Total</span>
      <span style="font-size:14px;font-weight:800;color:#3730A3">${(p.nags||[]).reduce((s,n)=>s+(+n.count||0),0)} pcs</span>
      <span></span><span></span>
      <span style="font-size:14px;font-weight:800;color:#3730A3">${fmt(c.nag)}</span>
    </div>`
    :`<div style="padding:24px 18px;text-align:center;color:#C4B5A0;font-size:14px">No ingredients</div>`;

  const charges=[
    ["Majduri Charge",p.majduriCharge],
    ["Theke Dari",p.thekeDari],
    ...(p.otherCharges||[]).map(o=>[o.label,o.amount])
  ].map(([l,v])=>`<div class="charge-row"><span>${esc(l)}</span><strong>${fmt(v)}</strong></div>`).join("");

  const kHtml=p.karigar?`
    <div class="hero-karigar">
      <div class="avatar" style="width:24px;height:24px;background:#F59E0B;color:#fff;font-size:10px">${ini(p.karigar)}</div>
      <span style="font-size:13px;font-weight:600">${esc(p.karigar)}</span>
    </div>`:"";

  document.getElementById("screen-products-detail").innerHTML=`
    <div class="detail-hero">
      <div class="hero-inner">
        <div>
          <div class="hero-eyebrow">Product</div>
          <div class="hero-name">${esc(p.name)}</div>
          ${kHtml}
        </div>
        <div>
          <div class="hero-cost-label">TOTAL COST</div>
          <div class="hero-cost-val">${fmt(c.total)}</div>
        </div>
      </div>
    </div>
    <div class="section-label">Ingredients & Cost Breakdown</div>
    <div class="detail-card">
      ${nagsHtml}
      <div class="charges-section">
        <div class="charges-lbl">Charges</div>
        ${charges}
      </div>
      <div class="total-bar"><span>Total Cost Price</span><strong>${fmt(c.total)}</strong></div>
    </div>
    ${p.notes?`<div class="notes-box"><div class="notes-lbl">📝 Notes</div><p>${esc(p.notes)}</p></div>`:""}`;
}

// ── KARIGAR LIST ──
function renderKList(){
  const q=(document.getElementById("search-input").value||"").toLowerCase();
  const ks=[...new Set(products.map(p=>p.karigar).filter(Boolean))].filter(k=>k.toLowerCase().includes(q));
  const el=document.getElementById("screen-karigar-list");
  if(!ks.length){el.innerHTML=`<div class="empty"><div class="empty-icon">👤</div>No karigars yet.</div>`;return;}
  el.innerHTML=ks.map(k=>{
    const kp=products.filter(p=>p.karigar===k), p=pal(k);
    return `<div class="prod-row" onclick="openKarigar('${esc(k)}')">
      <div class="avatar" style="width:48px;height:48px;background:${p.bg};color:${p.fg};font-size:15px;border:2px solid ${p.fg}22">${ini(k)}</div>
      <div class="prod-meta">
        <div class="prod-name">${esc(k)}</div>
        <div class="prod-sub"><span>${kp.length} product${kp.length!==1?"s":""}</span></div>
      </div>
      <div class="view-badge">View →</div>
    </div>`;
  }).join("");
}

function openKarigar(name){
  selKarigar=name;
  const kp=products.filter(p=>p.karigar===name), p=pal(name);
  const rows=kp.length?kp.map(p=>`
    <div class="prod-row" onclick="goToProduct('${esc(p.id)}')">
      <div style="width:42px;height:42px;border-radius:10px;background:#F3E8FF;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">◎</div>
      <div class="prod-meta">
        <div class="prod-name">${esc(p.name)}</div>
        <div class="prod-sub"><span>${p.nags?.length||0} ingredient${p.nags?.length!==1?"s":""}</span></div>
      </div>
      <div style="font-size:15px;font-weight:800;color:#2D1B69">${fmt(cost(p).total)}</div>
      <div style="color:#9C8B7A;font-size:18px;margin-left:4px">›</div>
    </div>`).join(""):
    `<div class="empty"><div class="empty-icon">◎</div>No products.</div>`;
  document.getElementById("screen-karigar-detail").innerHTML=`
    <div class="karigar-hero">
      <div class="avatar" style="width:60px;height:60px;background:${p.bg};color:${p.fg};font-size:20px;border:3px solid ${p.fg}44">${ini(name)}</div>
      <div><div class="karigar-name">${esc(name)}</div><div class="karigar-sub">${kp.length} product${kp.length!==1?"s":""}</div></div>
    </div>
    <div class="section-label">Products by this karigar</div>${rows}`;
  go("karigar-detail");
}

function goToProduct(id){
  tab="products";
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab==="products"));
  openProduct(id);
}

// ── NAG LIBRARY ──
function renderNagList(){
  const el=document.getElementById("screen-naglist");
  if(!nagLib.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🧪</div>No nags saved. Click "+ Add Nag".</div>`;return;}
  el.innerHTML=`
    <div style="margin-bottom:12px;font-size:13px;color:#9C8B7A;font-weight:600">${nagLib.length} saved nag${nagLib.length!==1?"s":""} — reuse when adding ingredients.</div>
    ${nagLib.map(n=>`
    <div class="nag-lib-row">
      <div class="nag-lib-dot">🔮</div>
      <div class="nag-lib-name">${esc(n.name)}</div>
      <span class="nag-lib-unit">${esc(n.unit)}</span>
      <div class="nag-lib-actions">
        <button class="btn-icon" onclick="openEditNag('${esc(n.id)}')">✏️</button>
        <button class="btn-icon del" onclick="deleteNag('${esc(n.id)}')">✕</button>
      </div>
    </div>`).join("")}`;
}

function fillUnitSel(selId, val){
  document.getElementById(selId).innerHTML=RATE_UNITS.map(u=>`<option value="${u}"${u===val?" selected":""}>${u}</option>`).join("");
}

function openAddNag(){
  editNagId=null;
  document.getElementById("nag-modal-title").textContent="Add Nag to List";
  document.getElementById("nag-modal-name").value="";
  fillUnitSel("nag-modal-unit","per/pc");
  document.getElementById("nag-modal").classList.add("open");
}

function openEditNag(id){
  const n=nagLib.find(x=>x.id===id); if(!n)return;
  editNagId=id;
  document.getElementById("nag-modal-title").textContent="Edit Nag";
  document.getElementById("nag-modal-name").value=n.name;
  fillUnitSel("nag-modal-unit",n.unit);
  document.getElementById("nag-modal").classList.add("open");
}

function closeNagModal(){ document.getElementById("nag-modal").classList.remove("open"); }

document.getElementById("nag-modal-save").addEventListener("click",()=>{
  const name=document.getElementById("nag-modal-name").value.trim();
  const unit=document.getElementById("nag-modal-unit").value;
  if(!name){toast("Nag name required","err");return;}
  if(editNagId){ const i=nagLib.findIndex(n=>n.id===editNagId); if(i>-1) nagLib[i]={...nagLib[i],name,unit}; toast("Nag updated!"); }
  else { nagLib.push({id:uid(),name,unit}); toast("Nag saved!"); }
  save(); closeNagModal(); renderNagList();
});

function deleteNag(id){
  if(!confirm("Remove from list?"))return;
  nagLib=nagLib.filter(n=>n.id!==id);
  save(); renderNagList(); toast("Removed");
}

// ── FORM ──
function renderForm(){
  const f=fs, isEdit=!!editId;

  const nagHead=f.nags.length?`
    <div class="nag-cols" style="margin-bottom:8px">
      <span style="font-size:11px;font-weight:700;color:#9C8B7A;text-transform:uppercase">Name</span>
      <span style="font-size:11px;font-weight:700;color:#9C8B7A;text-transform:uppercase">Pieces</span>
      <span style="font-size:11px;font-weight:700;color:#9C8B7A;text-transform:uppercase">Rate (₹)</span>
      <span style="font-size:11px;font-weight:700;color:#9C8B7A;text-transform:uppercase">Unit</span>
      <span></span>
    </div>`:"";

  const nagRows=f.nags.map((n,i)=>`
    <div class="nag-cols" style="margin-bottom:8px;align-items:center">
      <input class="form-input" placeholder="e.g. Red Glass" value="${esc(n.name)}" oninput="fs.nags[${i}].name=this.value">
      <input class="form-input" type="number" placeholder="0" value="${esc(n.count)}" oninput="fs.nags[${i}].count=this.value;updateNagLive()">
      <input class="form-input" type="number" placeholder="0" value="${esc(n.rate)}"  oninput="fs.nags[${i}].rate=this.value;updateNagLive()">
      <select class="form-select" onchange="fs.nags[${i}].rateUnit=this.value">
        ${RATE_UNITS.map(u=>`<option value="${u}"${u===n.rateUnit?" selected":""}>${u}</option>`).join("")}
      </select>
      <button class="btn-del" onclick="removeNag(${i})">✕</button>
    </div>`).join("");

  const pickHtml=nagLib.length?`
    <div class="pick-wrap">
      <button class="pick-btn" onclick="togglePick(event)">📋 Pick from Nag List ▾</button>
      <div class="pick-list" id="pick-list">
        ${nagLib.map(n=>`<div class="pick-item" onclick="pickNag('${esc(n.id)}')"><span>${esc(n.name)}</span><span class="pick-unit">${esc(n.unit)}</span></div>`).join("")}
      </div>
    </div>`:"";

  const otherRows=f.otherCharges.map((o,i)=>`
    <div class="other-cols" style="margin-bottom:8px;align-items:end">
      <div>${i===0?`<label class="form-label">Charge Label</label>`:""}
        <input class="form-input" placeholder="e.g. Packing" value="${esc(o.label)}" oninput="fs.otherCharges[${i}].label=this.value"></div>
      <div>${i===0?`<label class="form-label">Amount (₹)</label>`:""}
        <input class="form-input" type="number" placeholder="0" value="${esc(o.amount)}" oninput="fs.otherCharges[${i}].amount=this.value"></div>
      <button class="btn-del" onclick="removeOther(${i})" style="${i===0?"margin-top:20px":""}">✕</button>
    </div>`).join("");

  document.getElementById("screen-form").innerHTML=`
    <div class="form-box">
      <div class="form-section-title">Basic Info</div>
      <div class="form-grid-2">
        <div><label class="form-label">Product Name *</label>
          <input class="form-input" placeholder="e.g. Baby Bangle" value="${esc(f.name)}" oninput="fs.name=this.value"></div>
        <div><label class="form-label">Karigar Name</label>
          <input class="form-input" placeholder="e.g. Ramesh Soni" value="${esc(f.karigar)}" oninput="fs.karigar=this.value"></div>
      </div>
    </div>

    <div class="form-box">
      <div class="form-section-title">Ingredients (Nag)</div>
      ${pickHtml}
      ${nagHead}
      <div id="nag-container">${nagRows}</div>
      <div id="nag-live-totals"></div>
      <button class="btn-add-row" onclick="addBlankNag()">+ Add Manually</button>
    </div>

    <div class="form-box">
      <div class="form-section-title">Charges</div>
      <div class="form-grid-2" style="margin-bottom:12px">
        <div><label class="form-label">Majduri Charge (₹)</label>
          <input class="form-input" type="number" placeholder="0" value="${esc(f.majduriCharge)}" oninput="fs.majduriCharge=this.value"></div>
        <div><label class="form-label">Theke Dari (₹)</label>
          <input class="form-input" type="number" placeholder="0" value="${esc(f.thekeDari)}" oninput="fs.thekeDari=this.value"></div>
      </div>
      <div id="other-container">${otherRows}</div>
      <button class="btn-add-other" onclick="addOther()">+ Add Other Charge</button>
    </div>

    <div class="form-box">
      <div class="form-section-title">Notes</div>
      <textarea class="form-textarea" placeholder="Sizes, colours, supplier info…" oninput="fs.notes=this.value">${esc(f.notes)}</textarea>
    </div>

    <div class="form-actions">
      <button class="btn-primary" onclick="saveProduct()">${isEdit?"Save Changes":"Add Product"}</button>
      <button class="btn-ghost" onclick="cancelForm()">Cancel</button>
    </div>`;
}

function togglePick(e){
  e.stopPropagation();
  pickOpen=!pickOpen;
  document.getElementById("pick-list")?.classList.toggle("open",pickOpen);
}
document.addEventListener("click",()=>{ pickOpen=false; document.getElementById("pick-list")?.classList.remove("open"); });

function pickNag(id){
  const n=nagLib.find(x=>x.id===id); if(!n)return;
  fs.nags.push({name:n.name,count:"",rate:"",rateUnit:n.unit});
  pickOpen=false; renderForm(); go("form"); updateNagLive();
}
function updateNagLive(){
  const totalPcs = fs.nags.reduce((s,n)=>s+(+n.count||0),0);
  const totalAmt = fs.nags.reduce((s,n)=>s+(+n.count||0)*(+n.rate||0),0);
  const el = document.getElementById("nag-live-totals");
  if(!el) return;
  if(!fs.nags.length){ el.innerHTML=""; return; }
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#EEF2FF,#F3E8FF);border:1.5px solid #C4B5FD;border-radius:10px;padding:10px 14px;margin:8px 0 6px;">
    <span style="font-size:12px;font-weight:700;color:#6366F1;text-transform:uppercase;letter-spacing:0.06em">Total</span>
    <div style="display:flex;gap:20px;align-items:center">
      <div style="text-align:center">
        <div style="font-size:10px;font-weight:700;color:#9C8B7A;text-transform:uppercase;letter-spacing:0.06em">Pieces</div>
        <div style="font-size:18px;font-weight:800;color:#3730A3">${totalPcs}</div>
      </div>
      <div style="width:1px;height:30px;background:#C4B5FD"></div>
      <div style="text-align:center">
        <div style="font-size:10px;font-weight:700;color:#9C8B7A;text-transform:uppercase;letter-spacing:0.06em">Amount</div>
        <div style="font-size:18px;font-weight:800;color:#3730A3">${fmt(totalAmt)}</div>
      </div>
    </div>
  </div>`;
}
function addBlankNag(){ fs.nags.push({name:"",count:"",rate:"",rateUnit:"per/pc"}); renderForm(); go("form"); updateNagLive(); }
function removeNag(i) { fs.nags.splice(i,1); renderForm(); go("form"); updateNagLive(); }
function addOther()   { fs.otherCharges.push({label:"",amount:""}); renderForm(); go("form"); }
function removeOther(i){ fs.otherCharges.splice(i,1); renderForm(); go("form"); }

function saveProduct(){
  if(!fs.name.trim()){toast("Product name required","err");return;}
  if(editId){
    const i=products.findIndex(p=>p.id===editId);
    if(i>-1) products[i]={...fs,id:editId};
    selProduct=products.find(p=>p.id===editId);
    save(); toast("Saved!"); renderDetail(); go("products-detail");
  } else {
    products.unshift({...fs,id:uid()});
    save(); toast("Product added!"); renderPList(); go("products-list");
  }
}
function cancelForm(){ go(editId?"products-detail":tab+"-list"); }

function openAddForm(){
  editId=null;
  fs={name:"",karigar:"",nags:[],majduriCharge:"",thekeDari:"",otherCharges:[],notes:""};
  renderForm(); go("form");
}
function openEditForm(){
  if(!selProduct)return;
  editId=selProduct.id;
  fs=JSON.parse(JSON.stringify(selProduct));
  renderForm(); go("form");
}
function delProduct(){
  if(!selProduct||!confirm("Delete this product?"))return;
  products=products.filter(p=>p.id!==selProduct.id);
  save(); toast("Deleted"); selProduct=null; editId=null; renderPList(); go("products-list");
}

// ── WIRE UP ──
document.getElementById("btn-back").addEventListener("click",()=>{
  if(cur==="form") cancelForm();
  else if(cur==="products-detail"){ renderPList(); go("products-list"); }
  else if(cur==="karigar-detail") { renderKList(); go("karigar-list"); }
});
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    tab=btn.dataset.tab;
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b===btn));
    document.getElementById("search-input").value="";
    if(tab==="products"){ renderPList(); go("products-list"); }
    else if(tab==="karigar"){ renderKList(); go("karigar-list"); }
    else if(tab==="naglist"){ renderNagList(); go("naglist"); }
  });
});
document.getElementById("search-input").addEventListener("input",()=>{
  if(tab==="products") renderPList(); else if(tab==="karigar") renderKList();
});
document.getElementById("btn-add-product").addEventListener("click", openAddForm);
document.getElementById("btn-add-nag").addEventListener("click",    openAddNag);
document.getElementById("btn-edit").addEventListener("click",        openEditForm);
document.getElementById("btn-delete").addEventListener("click",      delProduct);

load();
fillUnitSel("nag-modal-unit","per/pc");
renderPList();
go("products-list");
</script>
</body>
</html>
